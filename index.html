<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InterviewAI - SAP CPI Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f4f8; --surface:#ffffff; --border:#e2e8f0; --text:#1e293b;
  --accent:#4f46e5; --r-lg:16px; --shadow-lg:0 10px 40px rgba(0,0,0,.12);
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased}

/* ═══════════════ SETUP SCREEN ═══════════════ */
#setup{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);z-index:100;}
.card{background:#fff;border-radius:20px;padding:40px;width:480px;box-shadow:0 20px 60px rgba(0,0,0,.25);}
.ai-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.ai-opt{border:2px solid #e2e8f0;border-radius:10px;padding:15px;cursor:pointer;text-align:center;font-weight:600;}
.ai-opt.selected{border-color:var(--accent);background:#ede9fe;color:var(--accent);}
input{width:100%;border:1.5px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:20px;outline:none;font-family:monospace;}
.go-btn{width:100%;background:var(--accent);border:none;border-radius:10px;color:#fff;padding:15px;font-weight:700;cursor:pointer;}

/* ═══════════════ MAIN APP ═══════════════ */
#app{display:none;height:100vh;flex-direction:column;}
.bar{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:56px;background:#fff;border-bottom:1px solid var(--border);flex-shrink:0;}
.feed{flex:1;overflow-y:auto;padding:30px 20px;display:block;scroll-behavior:smooth;}
.feed::-webkit-scrollbar{width:6px}
.feed::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:6px}

/* Response Card */
.qa{background:#fff;border:1.5px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--shadow-lg);width:100%;max-width:950px;margin:0 auto 40px auto;animation:pop .25s ease;flex-shrink:0;}
@keyframes pop{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.qa-q{padding:18px 25px;background:#f8fafc;border-bottom:1.5px solid var(--border);font-weight:700;font-size:16px;color:var(--accent);}
.qa-a{padding:25px 30px}
.qa-a-body{font-size:16.5px;line-height:1.8;color:#1e293b;}
.qa-a-body h1, .qa-a-body h2 {margin:25px 0 15px;padding-bottom:8px;border-bottom:1px solid #edf2f7;color:#000;}
.qa-a-body a {color:var(--accent);text-decoration:none;font-weight:600;}

.bot{padding:12px 20px;background:#fff;border-top:1px solid var(--border);display:flex;justify-content:space-between;font-size:13px;color:#64748b;}

/* Voice UI */
#rec{position:fixed;inset:0;background:rgba(15,23,42,0.95);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:200;color:#fff;}
#rec.on{display:flex}
.rec-text {margin-top:20px;font-family:monospace;max-width:80%;text-align:center;font-size:18px;color:#cbd5e1;}

/* Stealth Dot */
.stealth-dot {display:none;position:fixed;top:5px;right:5px;width:6px;height:6px;background:red;border-radius:50%;z-index:9999;}
body.stealth-mode .bar, body.stealth-mode .bot {display:none !important;}
body.stealth-mode.is-recording .stealth-dot {display:block;}
body.stealth-mode .qa {box-shadow:none;border-color:transparent;max-width:100%;}
</style>
</head>
<body>
<div class="stealth-dot"></div>

<div id="setup">
  <div class="card">
    <h2>InterviewAI Pro</h2>
    <p style="color:#64748b;font-size:14px;margin-bottom:25px;">Detailed technical responses for SAP CPI.</p>
    <div class="ai-row">
      <div id="opt-gemini" class="ai-opt selected" onclick="setAI('gemini')">Gemini</div>
      <div id="opt-serper" class="ai-opt" onclick="setAI('serper')">Search</div>
    </div>
    <input type="password" id="key-input" value="AIzaSyD6Guhk0m8Q9qvvMpWaNYP5ACQx16p9DIo">
    <button class="go-btn" onclick="startApp()">Start Assistant →</button>
  </div>
</div>

<div id="app">
  <div class="bar"><div>InterviewAI</div><div>[Alt+S] Stealth | Right-Click to Talk</div></div>
  <div class="feed" id="feed">
    <div id="empty-state" style="text-align:center;margin-top:15vh;color:#94a3b8;"><h2>Ready</h2><p>Right-click once to talk, right-click again to send.</p></div>
  </div>
  <div class="bot"><div id="status">Status: Ready</div><button onclick="document.querySelectorAll('.qa').forEach(e=>e.remove());document.getElementById('empty-state').style.display='block';">🗑 Clear</button></div>
</div>

<div id="rec">
    <h2 id="rec-status">Listening...</h2>
    <div id="live-text" class="rec-text">...</div>
    <div style="margin-top:30px; font-size:12px; color:#64748b;">(Right-click again to stop and submit)</div>
</div>

<script>
let currentAI = 'gemini', recognition = null, isRecording = false, config = { key: '' }, micTimeout = null;

function setAI(val) {
    currentAI = val;
    document.querySelectorAll('.ai-opt').forEach(e => e.classList.remove('selected'));
    document.getElementById('opt-' + val).classList.add('selected');
}

function startApp() {
    config.key = document.getElementById('key-input').value.trim();
    document.getElementById('setup').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
}

document.addEventListener('contextmenu', e => {
    if (document.getElementById('app').style.display === 'flex') {
        e.preventDefault();
        if (!isRecording) startRecording(); else stopRecording();
    }
});

document.addEventListener('keydown', e => { if (e.altKey && e.key.toLowerCase() === 's') document.body.classList.toggle('stealth-mode'); });

function startRecording() {
    const SDK = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SDK) { alert("Speech recognition not supported. Please use Chrome."); return; }
    
    recognition = new SDK();
    recognition.continuous = true;
    recognition.interimResults = true;
    
    // Safety check for mic activity
    micTimeout = setTimeout(() => {
        if (isRecording && document.getElementById('live-text').textContent === "...") {
            alert("No speech detected. Please check browser microphone permissions (Lock icon in address bar).");
        }
    }, 4000);

    document.getElementById('rec').classList.add('on');
    document.body.classList.add('is-recording');
    isRecording = true;

    recognition.onresult = e => {
        clearTimeout(micTimeout); // Audio received, clear warning
        let text = '';
        for (let i = 0; i < e.results.length; i++) text += e.results[i][0].transcript;
        document.getElementById('live-text').textContent = text;
    };

    recognition.onerror = e => {
        if(e.error === 'not-allowed') alert("Microphone access blocked. Enable it in Chrome settings.");
        cancelRec();
    };

    recognition.start();
}

function stopRecording() {
    let q = document.getElementById('live-text').textContent.trim();
    if (recognition) { recognition.onresult = null; recognition.abort(); }
    clearTimeout(micTimeout);
    document.getElementById('rec').classList.remove('on');
    document.body.classList.remove('is-recording');
    isRecording = false;

    // Auto-Corrections
    q = q.replace(/\bSAP CPA\b/gi, 'SAP CPI')
         .replace(/\bHenry\b/gi, 'Enrich')
         .replace(/\bhenry\b/gi, 'enrich')
         .replace(/\bcontent in rich\b/gi, 'content enrich');

    if (q && q !== '...') handleQuery(q);
}

function cancelRec() {
    if (recognition) recognition.abort();
    clearTimeout(micTimeout);
    document.getElementById('rec').classList.remove('on');
    document.body.classList.remove('is-recording');
    isRecording = false;
}

async function handleQuery(q) {
    document.getElementById('empty-state').style.display = 'none';
    document.querySelectorAll('.qa').forEach(e => e.remove());
    const card = document.createElement('div'); card.className = 'qa';
    card.innerHTML = `<div class="qa-q">${q}</div><div class="qa-a"><div class="qa-a-body" id="cur-ans">Fetching detailed response...</div></div>`;
    document.getElementById('feed').appendChild(card);
    
    try {
        let text = currentAI === 'gemini' ? await callGemini(q) : await callSerper(q);
        const container = document.getElementById('cur-ans');
        container.innerHTML = marked.parse(text); 
        document.getElementById('feed').scrollTop = 0;
    } catch (err) { document.getElementById('cur-ans').innerHTML = `<b style="color:red">Error:</b> ${err.message}`; }
}

async function callGemini(query) {
    // Simplified prompt for natural, exhaustive Web UI-style responses
    const prompt = `Answer the following question about SAP Cloud Platform Integration (SAP CPI) exactly as a high-level technical assistant would. Provide a very comprehensive, exhaustive, and naturally formatted technical response. Use headings and bold text for clarity. Question: "${query}"`;
    
    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${config.key}`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ 
            contents: [{ parts: [{ text: prompt }] }], 
            generationConfig: { maxOutputTokens: 4000, temperature: 0.7 } 
        })
    });
    const data = await response.json();
    if (data.error) throw new Error(data.error.message);
    if (data.candidates && data.candidates[0] && data.candidates[0].content) {
        return data.candidates[0].content.parts[0].text;
    } else {
        throw new Error("No response. Check API quota.");
    }
}

async function callSerper(query) {
    const res = await fetch('https://google.serper.dev/search', {
        method: 'POST', headers: { 'X-API-KEY': config.key, 'Content-Type': 'application/json' },
        body: JSON.stringify({ q: query })
    });
    const data = await res.json();
    let md = "## Search Results\n\n";
    if (data.organic) data.organic.slice(0, 5).forEach(r => md += `### [${r.title}](${r.link})\n${r.snippet}\n\n`);
    return md;
}
</script>
</body>
</html>
