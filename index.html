<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InterviewAI - Ultra Fast Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f4f8; --surface:#ffffff; --border:#e2e8f0; --text:#1e293b;
  --r-lg:16px; --shadow-lg:0 10px 40px rgba(0,0,0,.12);
}
/* Theme Accents */
body.theme-gemini { --accent: #4285f4; --accent-bg: #dbeafe; }
body.theme-openai { --accent: #10a37f; --accent-bg: #d1fae5; }
body.theme-claude { --accent: #d97706; --accent-bg: #fef3c7; }
body.theme-serper { --accent: #4f46e5; --accent-bg: #e0e7ff; }

body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased}

/* ═══════════════ SETUP ═══════════════ */
#setup{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);z-index:100;}
.card{background:#fff;border-radius:20px;padding:40px;width:520px;box-shadow:0 20px 60px rgba(0,0,0,.25);}
.ai-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.ai-opt{border:2px solid #e2e8f0;border-radius:10px;padding:12px;cursor:pointer;text-align:center;font-weight:600;}
.ai-opt.selected{border-color:#4f46e5;background:#ede9fe;}
input{width:100%;border:1.5px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:20px;outline:none;font-family:monospace;}
.go-btn{width:100%;background:#4f46e5;border:none;border-radius:10px;color:#fff;padding:15px;font-weight:700;cursor:pointer;}

/* ═══════════════ MAIN APP ═══════════════ */
#app{display:none;height:100vh;flex-direction:column;}
.bar{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:56px;background:#fff;border-bottom:1px solid var(--border);flex-shrink:0;font-weight:700;}
.feed{flex:1;overflow-y:auto;padding:20px;display:block;scroll-behavior:smooth;}
.feed::-webkit-scrollbar{width:6px}
.feed::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:6px}

/* Dynamic Response Card */
.qa{background:#fff;border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--shadow-lg);width:100%;max-width:950px;margin:0 auto 40px auto;animation:pop .2s ease-out;flex-shrink:0;}
@keyframes pop{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.qa-q{padding:15px 25px;background:#f8fafc;border-bottom:1px solid var(--border);font-weight:700;}
.qa-a{padding:25px 30px}
.qa-a-badge{display:inline-block;background:var(--accent-bg);color:var(--accent);border-radius:6px;padding:3px 10px;font-size:10px;font-weight:700;text-transform:uppercase;margin-bottom:15px;border:1px solid var(--accent);}
.qa-a-body{font-size:16px;line-height:1.8;}
.qa-a-body h2 {color:var(--accent); border-bottom:1.5px solid var(--accent-bg); padding-bottom:5px; margin:20px 0 10px;}

/* Voice UI & Stealth */
#rec{position:fixed;inset:0;background:rgba(15,23,42,0.97);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:200;color:#fff;}
#rec.on{display:flex}
.stealth-dot {display:none;position:fixed;top:5px;right:5px;width:5px;height:5px;background:red;border-radius:50%;z-index:9999;}
body.stealth-mode .bar, body.stealth-mode .bot {display:none !important;}
body.stealth-mode.is-recording .stealth-dot {display:block;}
body.stealth-mode .qa {box-shadow:none;border:none;max-width:100%;}
</style>
</head>
<body class="theme-gemini">
<div class="stealth-dot"></div>

<div id="setup">
  <div class="card">
    <h2 style="margin-bottom:20px;">InterviewAI Pro</h2>
    <div class="ai-row">
      <div id="opt-gemini" class="ai-opt selected" onclick="setAI('gemini')">Gemini</div>
      <div id="opt-openai" class="ai-opt" onclick="setAI('openai')">ChatGPT</div>
      <div id="opt-claude" class="ai-opt" onclick="setAI('claude')">Claude</div>
      <div id="opt-serper" class="ai-opt" onclick="setAI('serper')">Search</div>
    </div>
    <input type="password" id="key-input" placeholder="Enter API Key">
    <button class="go-btn" onclick="startApp()">Start Instant Assistant →</button>
  </div>
</div>

<div id="app">
  <div class="bar"><div>InterviewAI</div><div style="font-weight:400;font-size:12px;">Right-click talk | Alt+S Stealth</div></div>
  <div class="feed" id="feed">
    <div id="empty-state" style="text-align:center;margin-top:15vh;color:#94a3b8;"><h2>Ready</h2><p>Right-click once to start, right-click again to finish.</p></div>
  </div>
</div>

<div id="rec"><h2>Listening...</h2><div id="live-text" style="margin-top:20px;font-family:monospace;color:#cbd5e1;">...</div></div>

<script>
let currentAI = 'gemini', recognition = null, isRecording = false, config = { key: '' }, activeCtrl = null;

function setAI(v) { 
  currentAI = v; 
  document.querySelectorAll('.ai-opt').forEach(e=>e.classList.remove('selected'));
  document.getElementById('opt-'+v).classList.add('selected');
  document.body.className = 'theme-' + v;
}

function startApp() {
  config.key = document.getElementById('key-input').value.trim();
  document.getElementById('setup').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
}

document.addEventListener('contextmenu', e => {
  if (document.getElementById('app').style.display === 'flex') {
    e.preventDefault();
    if (!isRecording) startRecording(); else stopRecording();
  }
});

document.addEventListener('keydown', e => { if (e.altKey && e.key.toLowerCase() === 's') document.body.classList.toggle('stealth-mode'); });

function startRecording() {
  const SDK = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SDK) return;
  if (activeCtrl) activeCtrl.abort();
  activeCtrl = new AbortController();
  recognition = new SDK(); recognition.continuous = true; recognition.interimResults = true;
  document.getElementById('rec').classList.add('on'); document.body.classList.add('is-recording');
  isRecording = true;
  recognition.onresult = e => {
    let t = ''; for (let i = 0; i < e.results.length; i++) t += e.results[i][0].transcript;
    document.getElementById('live-text').textContent = t;
  };
  recognition.start();
}

function stopRecording() {
  let q = document.getElementById('live-text').textContent.trim();
  if (recognition) recognition.abort();
  document.getElementById('rec').classList.remove('on'); document.body.classList.remove('is-recording');
  isRecording = false;
  q = q.replace(/\bSAP CPA\b/gi,'SAP CPI').replace(/\bHenry\b/gi,'Enrich');
  if (q && q !== '...') handleQuery(q);
}

async function handleQuery(q) {
  document.getElementById('empty-state').style.display = 'none';
  document.querySelectorAll('.qa').forEach(e => e.remove());
  const card = document.createElement('div'); card.className = 'qa';
  const badge = currentAI === 'openai' ? 'ChatGPT' : currentAI.charAt(0).toUpperCase() + currentAI.slice(1);
  card.innerHTML = `<div class="qa-q">${q}</div><div class="qa-a"><div class="qa-a-badge">${badge}</div><div class="qa-a-body" id="ans">Fetching...</div></div>`;
  document.getElementById('feed').appendChild(card);

  try {
    const container = document.getElementById('ans');
    let fullText = "";

    // ⚡ ULTRA-FAST STREAMING HANDLER
    if (currentAI === 'gemini') {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:streamGenerateContent?key=${config.key}`, {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({contents: [{parts: [{text: `Answer about SAP CPI: ${q}`}]}]}),
            signal: activeCtrl.signal
        });
        const reader = response.body.getReader();
        while (true) {
            const {done, value} = await reader.read();
            if (done) break;
            const chunk = new TextDecoder().decode(value);
            const lines = chunk.split('\n');
            for (let line of lines) {
                if (line.startsWith('["') || line.startsWith(',')) {
                    try {
                        const data = JSON.parse(line.startsWith(',') ? line.slice(1) : line);
                        fullText += data.candidates[0].content.parts[0].text;
                        container.innerHTML = marked.parse(fullText);
                        document.getElementById('feed').scrollTop = 0;
                    } catch(e) {}
                }
            }
        }
    } else {
        // Fallback for non-streaming models
        fullText = await (currentAI === 'openai' ? callOpenAI(q) : callSerper(q));
        container.innerHTML = marked.parse(fullText);
    }
  } catch (err) { if(err.name !== 'AbortError') document.getElementById('ans').innerHTML = `<b style="color:red">Error:</b> ${err.message}`; }
}

async function callOpenAI(q) {
    const res = await fetch('https://api.openai.com/v1/chat/completions', {
        method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${config.key}` },
        body: JSON.stringify({ model: 'gpt-4o', messages: [{ role: 'user', content: q }] })
    });
    const d = await res.json(); return d.choices[0].message.content;
}

async function callSerper(q) {
    const res = await fetch('https://google.serper.dev/search', {
        method: 'POST', headers: { 'X-API-KEY': config.key, 'Content-Type': 'application/json' },
        body: JSON.stringify({ q: q })
    });
    const d = await res.json();
    let md = "## Results\n\n";
    d.organic.slice(0,5).forEach(r => md += `* [${r.title}](${r.link})\n`);
    return md;
}
</script>
</body>
</html>
