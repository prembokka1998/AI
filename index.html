<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InterviewAI - Multi-Model UI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f4f8; --surface:#ffffff; --border:#e2e8f0; --text:#1e293b;
  --r-lg:16px; --shadow-lg:0 10px 40px rgba(0,0,0,.12);
  /* Default Theme Colors */
  --accent: #4f46e5; --accent-bg: #ede9fe;
}

/* Model Specific Themes */
body.theme-gemini { --accent: #4285f4; --accent-bg: #dbeafe; }
body.theme-openai { --accent: #10a37f; --accent-bg: #d1fae5; }
body.theme-claude { --accent: #d97706; --accent-bg: #fef3c7; }
body.theme-serper { --accent: #4f46e5; --accent-bg: #e0e7ff; }

body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased}

/* ═══════════════ SETUP SCREEN ═══════════════ */
#setup{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);z-index:100;}
.card{background:#fff;border-radius:20px;padding:40px;width:520px;box-shadow:0 20px 60px rgba(0,0,0,.25);}
.ai-row{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:20px}
.ai-opt{border:2px solid #e2e8f0;border-radius:10px;padding:12px;cursor:pointer;text-align:center;font-weight:600;transition: all 0.2s;}
.ai-opt.selected{border-color:#4f46e5;background:#ede9fe;}
input{width:100%;border:1.5px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:20px;outline:none;}
.go-btn{width:100%;background:#4f46e5;border:none;border-radius:10px;color:#fff;padding:15px;font-weight:700;cursor:pointer;}

/* ═══════════════ MAIN APP ═══════════════ */
#app{display:none;height:100vh;flex-direction:column;}
.bar{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:56px;background:#fff;border-bottom:1px solid var(--border);flex-shrink:0;}
.feed{flex:1;overflow-y:auto;padding:30px 20px;display:block;scroll-behavior:smooth;}
.feed::-webkit-scrollbar{width:6px}
.feed::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:6px}

/* Dynamic Response Card */
.qa{background:#fff;border:1.5px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--shadow-lg);width:100%;max-width:950px;margin:0 auto 40px auto;animation:pop .25s ease;flex-shrink:0;}
@keyframes pop{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.qa-q{padding:18px 25px;background:#f8fafc;border-bottom:1.5px solid var(--border);font-weight:700;font-size:16px;}
.qa-a{padding:25px 30px}
.qa-a-meta{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.qa-a-badge{background:var(--accent-bg);color:var(--accent);border-radius:6px;padding:3px 10px;font-size:10px;font-weight:700;text-transform:uppercase;border:1px solid var(--accent);}

.qa-a-body{font-size:16.5px;line-height:1.8;color:#1e293b;}
.qa-a-body h1, .qa-a-body h2 {margin:25px 0 15px;padding-bottom:8px;border-bottom:1.2px solid var(--accent-bg);color:var(--accent);}
.qa-a-body strong {color: var(--accent); font-weight: 700;}

.bot{padding:12px 20px;background:#fff;border-top:1px solid var(--border);display:flex;justify-content:space-between;font-size:13px;color:#64748b;}
#rec{position:fixed;inset:0;background:rgba(15,23,42,0.95);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:200;color:#fff;}
#rec.on{display:flex}
.rec-text {margin-top:20px;font-family:monospace;max-width:80%;text-align:center;font-size:18px;color:#cbd5e1;}

.stealth-dot {display:none;position:fixed;top:5px;right:5px;width:6px;height:6px;background:red;border-radius:50%;z-index:9999;}
body.stealth-mode .bar, body.stealth-mode .bot {display:none !important;}
body.stealth-mode.is-recording .stealth-dot {display:block;}
</style>
</head>
<body class="theme-gemini">
<div class="stealth-dot"></div>

<div id="setup">
  <div class="card">
    <h2 style="margin-bottom:10px;">InterviewAI Pro</h2>
    <div class="ai-row">
      <div id="opt-gemini" class="ai-opt selected" onclick="setAI('gemini')">Gemini</div>
      <div id="opt-openai" class="ai-opt" onclick="setAI('openai')">ChatGPT</div>
      <div id="opt-claude" class="ai-opt" onclick="setAI('claude')">Claude</div>
      <div id="opt-serper" class="ai-opt" onclick="setAI('serper')">Google Search</div>
    </div>
    <input type="password" id="key-input" placeholder="Enter API Key">
    <button class="go-btn" onclick="startApp()">Start Dynamic Assistant →</button>
  </div>
</div>

<div id="app">
  <div class="bar"><div>InterviewAI</div><div>[Alt+S] Stealth | Right-Click to Talk</div></div>
  <div class="feed" id="feed">
    <div id="empty-state" style="text-align:center;margin-top:15vh;color:#94a3b8;"><h2>Ready</h2><p>Right-click to talk, right-click to send.</p></div>
  </div>
  <div class="bot"><div id="status">Status: Ready</div><button onclick="document.querySelectorAll('.qa').forEach(e=>e.remove());document.getElementById('empty-state').style.display='block';">🗑 Clear</button></div>
</div>

<div id="rec">
    <h2>Listening...</h2>
    <div id="live-text" class="rec-text">...</div>
</div>

<script>
let currentAI = 'gemini', isRecording = false, config = { key: '' }, activeController = null;

function setAI(val) {
    currentAI = val;
    document.querySelectorAll('.ai-opt').forEach(e => e.classList.remove('selected'));
    document.getElementById('opt-' + val).classList.add('selected');
    document.body.className = 'theme-' + val;
}

function startApp() {
    config.key = document.getElementById('key-input').value.trim();
    document.getElementById('setup').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
}

function getPrompt(question) {
    return `Provide a comprehensive, high-level technical response regarding SAP Cloud Platform Integration (SAP CPI). Focus on exhaustive details and professional formatting. Question: "${question}"`;
}

document.addEventListener('contextmenu', e => {
    if (document.getElementById('app').style.display === 'flex') {
        e.preventDefault();
        if (!isRecording) startRecording(); else stopRecording();
    }
});

document.addEventListener('keydown', e => { if (e.altKey && e.key.toLowerCase() === 's') document.body.classList.toggle('stealth-mode'); });

function startRecording() {
    const SDK = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SDK) return;
    if (activeController) activeController.abort();
    activeController = new AbortController();
    recognition = new SDK(); recognition.continuous = true; recognition.interimResults = true;
    document.getElementById('rec').classList.add('on'); document.body.classList.add('is-recording');
    isRecording = true;
    recognition.onresult = e => {
        let text = ''; for (let i = 0; i < e.results.length; i++) text += e.results[i][0].transcript;
        document.getElementById('live-text').textContent = text;
    };
    recognition.start();
}

function stopRecording() {
    let q = document.getElementById('live-text').textContent.trim();
    if (recognition) recognition.abort();
    document.getElementById('rec').classList.remove('on'); document.body.classList.remove('is-recording');
    isRecording = false;
    q = q.replace(/\bSAP CPA\b/gi, 'SAP CPI').replace(/\bHenry\b/gi, 'Enrich').replace(/\bcontent in rich\b/gi, 'content enrich');
    if (q && q !== '...') handleQuery(q);
}

async function handleQuery(q) {
    document.getElementById('empty-state').style.display = 'none';
    document.querySelectorAll('.qa').forEach(e => e.remove());
    const card = document.createElement('div'); card.className = 'qa';
    const badgeName = currentAI === 'openai' ? 'ChatGPT' : currentAI.charAt(0).toUpperCase() + currentAI.slice(1);
    
    card.innerHTML = `<div class="qa-q">${q}</div>
    <div class="qa-a">
        <div class="qa-a-meta"><div class="qa-a-badge">${badgeName}</div></div>
        <div class="qa-a-body" id="cur-ans">Fetching response in ${badgeName} style...</div>
    </div>`;
    document.getElementById('feed').appendChild(card);
    
    try {
        let text = "";
        if (currentAI === 'gemini') text = await callGemini(q);
        else if (currentAI === 'openai') text = await callOpenAI(q);
        else if (currentAI === 'claude') text = await callClaude(q);
        else text = await callSerper(q);

        document.getElementById('cur-ans').innerHTML = marked.parse(text); 
        document.getElementById('feed').scrollTop = 0;
    } catch (err) { document.getElementById('cur-ans').innerHTML = `<b style="color:red">Error:</b> ${err.message}`; }
}

async function callGemini(query) {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${config.key}`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contents: [{ parts: [{ text: getPrompt(query) }] }], generationConfig: { maxOutputTokens: 4000, temperature: 0.7 } }),
        signal: activeController.signal
    });
    const data = await res.json();
    return data.candidates[0].content.parts[0].text;
}

async function callOpenAI(query) {
    const res = await fetch('https://api.openai.com/v1/chat/completions', {
        method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${config.key}` },
        body: JSON.stringify({ model: 'gpt-4o', messages: [{ role: 'user', content: getPrompt(query) }] }),
        signal: activeController.signal
    });
    const data = await res.json();
    return data.choices[0].message.content;
}

async function callClaude(query) {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST', headers: { 'Content-Type': 'application/json', 'x-api-key': config.key, 'anthropic-version': '2023-06-01', 'anthropic-dangerously-allow-browser': 'true' },
        body: JSON.stringify({ model: 'claude-3-5-sonnet-20241022', max_tokens: 4000, messages: [{ role: 'user', content: getPrompt(query) }] }),
        signal: activeController.signal
    });
    const data = await res.json();
    return data.content[0].text;
}

async function callSerper(query) {
    const res = await fetch('https://google.serper.dev/search', {
        method: 'POST', headers: { 'X-API-KEY': config.key, 'Content-Type': 'application/json' },
        body: JSON.stringify({ q: query }),
        signal: activeController.signal
    });
    const data = await res.json();
    let md = "## Search Results\n\n";
    data.organic.slice(0, 5).forEach(r => md += `### [${r.title}](${r.link})\n${r.snippet}\n\n`);
    return md;
}
</script>
</body>
</html>
