<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InterviewAI - SAP CPI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f4f8; --surface:#ffffff; --border:#e2e8f0; --text:#1e293b;
  --font:'Inter',sans-serif; --mono:'JetBrains Mono',monospace; --r-lg:16px;
  --shadow:0 1px 3px rgba(0,0,0,.08); --shadow-lg:0 10px 40px rgba(0,0,0,.12);
}
body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased}

/* ═══════════════ SETUP SCREEN ═══════════════ */
#setup{
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); z-index:100;overflow-y:auto;padding:20px;
}
.card{background:#fff;border-radius:20px;padding:40px 36px;width:480px;max-width:100%;box-shadow:0 20px 60px rgba(0,0,0,.25);}
.brand{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.brand-icon{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#4f46e5,#7c3aed);display:flex;align-items:center;justify-content:center;font-size:22px;}
.brand h1{font-size:24px;font-weight:700;color:#1e293b;}
.brand-sub{color:#64748b;font-size:13px;margin-bottom:32px;padding-left:56px}
.s-label{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:#94a3b8;margin-bottom:10px}
.ai-row{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:28px}
.ai-opt{border:2px solid #e2e8f0;border-radius:10px;padding:14px 10px;cursor:pointer;text-align:center;transition:all .18s;background:#f8fafc;}
.ai-opt:hover{border-color:#a5b4fc;background:#ede9fe}
.ai-opt.sel-gemini{border-color:#4285f4;background:#dbeafe}
.ai-opt.sel-claude{border-color:#d97706;background:#fef3c7}
.ai-opt.sel-openai{border-color:#059669;background:#d1fae5}
.ai-opt.sel-serper{border-color:#4f46e5;background:#e0e7ff} 
.ai-av{width:32px;height:32px;border-radius:50%;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800}
.av-g{background:#dbeafe;color:#4285f4} .av-c{background:#fef3c7;color:#d97706} .av-o{background:#d1fae5;color:#059669} .av-s{background:#e0e7ff;color:#4f46e5} 
.ai-nm{font-size:13px;font-weight:600;color:#1e293b}
.inp-wrap{position:relative;margin-bottom:6px}
.inp-wrap input{width:100%;border:1.5px solid #e2e8f0;border-radius:8px;font-size:12px;padding:11px 42px 11px 14px;background:#f8fafc;outline:none;}
.go-btn{width:100%;background:linear-gradient(135deg,#4f46e5,#7c3aed);border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:600;padding:15px;cursor:pointer;}

/* ═══════════════ MAIN APP ═══════════════ */
#app{display:none;height:100vh;flex-direction:column;background:var(--bg)}
.bar{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:56px;background:#fff;border-bottom:1px solid var(--border);flex-shrink:0;}
.bar-l{display:flex;align-items:center;gap:10px}
.bar-title{font-size:15px;font-weight:700;color:#1e293b}
.bar-r{display:flex;align-items:center;gap:8px}
.tag{display:flex;align-items:center;gap:5px;border-radius:20px;padding:5px 12px;font-size:11px;font-weight:500;border:1.5px solid;}
.tag-mic{background:#f0fdf4;border-color:#86efac;color:#059669}
.tag-ai{background:#f8fafc;border-color:#e2e8f0;color:#374151}
.tag-dot{width:7px;height:7px;border-radius:50%}
.td-g{background:#4285f4} .td-c{background:#d97706} .td-o{background:#059669} .td-s{background:#4f46e5}

.feed{flex:1;overflow-y:auto;padding:30px 20px;display:block;scroll-behavior:smooth;}
.feed::-webkit-scrollbar{width:6px}
.feed::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:6px}

.empty{margin-top: 8vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:16px;}
.qa{background:#fff;border:1.5px solid #e2e8f0;border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow-lg);animation:pop .25s ease;width:100%;max-width:900px;margin:0 auto 40px auto;flex-shrink:0;}
@keyframes pop{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.qa-q{display:flex;gap:12px;align-items:flex-start;padding:16px 20px;background:linear-gradient(135deg,#f8fafc,#f1f5f9);border-bottom:1.5px solid #e2e8f0;}
.qa-q-num{min-width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#4f46e5,#7c3aed);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;}
.qa-q-text{font-size:14px;font-weight:600;color:#1e293b;line-height:1.5;}

.qa-a{padding:24px 28px}
.qa-a-meta{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.qa-a-badge{border-radius:6px;padding:3px 10px;font-size:10px;font-weight:700;text-transform:uppercase;}
.b-g{background:#dbeafe;color:#1d4ed8} .b-c{background:#fef3c7;color:#92400e} .b-o{background:#d1fae5;color:#065f46} .b-s{background:#e0e7ff;color:#3730a3} 

.qa-a-body { font-size: 15.5px; line-height: 1.8; color: #1e293b;}
.qa-a-body p { margin-bottom: 16px; }
.qa-a-body strong { font-weight: 700; color: #000; }
.qa-a-body ul, .qa-a-body ol { padding-left: 24px; margin-bottom: 18px; }
.qa-a-body li { margin-bottom: 8px; }
.qa-a-body h1, .qa-a-body h2, .qa-a-body h3 { font-weight: 700; color: #000; margin: 28px 0 14px; border-bottom: 1px solid #eee; padding-bottom: 8px;}
.qa-a-body a { color: #4f46e5; text-decoration: none; font-weight: 600; }

.loader{display:flex;align-items:center;gap:8px;color:#94a3b8;font-size:13px;}
.dots span{width:7px;height:7px;border-radius:50%;background:#a5b4fc;display:inline-block;animation:db 1.2s infinite;}
@keyframes db{0%,80%,100%{transform:scale(.5);opacity:.3}40%{transform:scale(1);opacity:1}}

.bot{padding:10px 20px;background:#fff;border-top:1.5px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
#rec{position:fixed;inset:0;background:rgba(15,23,42,.92);display:none;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:200;}
#rec.on{display:flex}
.rec-core{width:68px;height:68px;border-radius:50%;background:#ef4444;display:flex;align-items:center;justify-content:center;font-size:28px;}
.rec-text{background:rgba(255,255,255,.08);padding:12px 18px;max-width:460px;width:90vw;color:#fff;text-align:center;border-radius:10px;}

/* Stealth Mode */
body.stealth-mode { background: #fff; }
body.stealth-mode .bar, body.stealth-mode .bot, body.stealth-mode .empty { display: none !important; }
body.stealth-mode .qa { box-shadow: none; border: none; max-width: 100%; }
body.stealth-mode .qa-q { background: #fff; border-bottom: 1px dashed #ccc; }
body.stealth-mode .qa-a-body { font-family: sans-serif; font-size: 14px; }
.stealth-dot { display: none; position: fixed; top: 5px; right: 5px; width: 5px; height: 5px; background: red; border-radius: 50%; z-index: 9999; }
body.stealth-mode.is-recording .stealth-dot { display: block; }
</style>
</head>
<body>
<div class="stealth-dot"></div>
<div id="setup">
  <div class="card">
    <div class="brand"><div class="brand-icon">🎯</div><h1>InterviewAI</h1></div>
    <p class="brand-sub">Detailed responses like Gemini Web UI</p>
    <div class="s-label">Provider</div>
    <div class="ai-row">
      <div class="ai-opt sel-gemini" data-ai="gemini" onclick="pickAI('gemini')"><div class="ai-av av-g">G</div><div class="ai-nm">Gemini</div></div>
      <div class="ai-opt" data-ai="serper" onclick="pickAI('serper')"><div class="ai-av av-s">S</div><div class="ai-nm">Search</div></div>
    </div>
    <div class="s-label">API Key</div>
    <div class="inp-wrap"><input type="password" id="kval" value="AIzaSyD6Guhk0m8Q9qvvMpWaNYP5ACQx16p9DIo"></div>
    <button class="go-btn" onclick="launch()">Start Assistant →</button>
  </div>
</div>

<div id="app">
  <div class="bar">
    <div class="bar-l"><span class="bar-title">InterviewAI</span></div>
    <div class="bar-r">
      <div class="tag tag-mic">Mic ready</div>
      <div class="tag tag-ai"><span class="tag-dot td-g" id="bdot"></span><span id="btxt">Gemini</span></div>
      <button onclick="location.reload()" style="background:none;border:none;cursor:pointer">⚙️</button>
    </div>
  </div>
  <div class="feed" id="feed">
    <div class="empty" id="empty"><h2>Ready</h2><p>Right-click to start, Right-click to send. Alt+S for Stealth.</p></div>
  </div>
  <div class="bot"><span>Ready (Alt+S for Stealth)</span><button onclick="clearFeed()">🗑 Clear</button></div>
</div>

<div id="rec">
  <div class="rec-core">🎤</div>
  <div class="rec-text" id="rtxt">Listening...</div>
  <button onclick="cancelRec()" style="color:#fff;background:none;border:1px solid #fff;padding:5px 10px;border-radius:5px;cursor:pointer">Cancel</button>
</div>

<script>
const keys={gemini:'AIzaSyD6Guhk0m8Q9qvvMpWaNYP5ACQx16p9DIo', serper:''};
let ai='gemini', recog=null, isRec=false, qnum=0, activeController=null;

/* ── SYSTEM PROMPT: Matches Gemini Web UI style exactly ── */
function getPrompt(question) {
  return `Act as a highly advanced technical consultant for SAP Cloud Platform Integration (SAP CPI). Provide a very comprehensive, detailed, and professional response to the following question. Use natural formatting, clear headings, and bullet points. Do not summarize or keep it short—provide all necessary technical details as seen in the official documentation.

Question: "${question}"`;
}

function pickAI(v){ ai=v; document.querySelectorAll('.ai-opt').forEach(c=>c.className='ai-opt'); document.querySelector(`[data-ai="${v}"]`).classList.add('ai-opt','sel-'+v); }
function launch(){ document.getElementById('setup').style.display='none'; document.getElementById('app').style.display='flex'; }

document.addEventListener('contextmenu', e => { if (document.getElementById('app').style.display === 'flex') { e.preventDefault(); if (!isRec) startRec(); else forceSubmit(); }});
document.addEventListener('keydown', e => { if(e.altKey && e.key.toLowerCase() === 's') document.body.classList.toggle('stealth-mode'); });

function startRec(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR) return; activeController = new AbortController();
  recog=new SR(); recog.continuous=true; recog.interimResults=true;
  document.getElementById('rec').classList.add('on'); document.body.classList.add('is-recording');
  isRec=true; let final='';
  recog.onresult=e=>{
    let inter=''; for(let i=e.resultIndex;i<e.results.length;i++) if(e.results[i].isFinal) final+=e.results[i][0].transcript+' '; else inter+=e.results[i][0].transcript;
    document.getElementById('rtxt').textContent=(final+inter).trim()||'Listening...';
  };
  recog.start();
}

function forceSubmit(){
  let q=document.getElementById('rtxt').textContent.trim();
  if(recog) recog.abort(); document.getElementById('rec').classList.remove('on'); document.body.classList.remove('is-recording'); isRec=false;
  q = q.replace(/\bSAP CPA\b/gi,'SAP CPI').replace(/\bHenry\b/gi,'Enrich');
  if(q&&q!='Listening...') answerQ(q);
}

function cancelRec(){ if(recog) recog.abort(); document.getElementById('rec').classList.remove('on'); isRec=false; }

async function answerQ(question){
  qnum++; const id=qnum; document.getElementById('empty').style.display='none';
  document.querySelectorAll('.qa').forEach(el=>el.remove());
  const card=document.createElement('div'); card.className='qa';
  card.innerHTML=`<div class="qa-q"><div class="qa-q-num">${id}</div><div class="qa-q-text">${question}</div></div>
  <div class="qa-a"><div id="body-${id}" class="loader"><div class="dots"><span></span><span></span><span></span></div>Fetching detailed response...</div></div>`;
  document.getElementById('feed').appendChild(card);
  
  try {
    let text='';
    if(ai==='serper') text=await doSerper(question);
    else text=await doGemini(question);
    const body=document.getElementById('body-'+id);
    body.className='qa-a-body'; body.innerHTML=marked.parse(text);
  } catch(e) { document.getElementById('body-'+id).innerHTML=`Error: ${e.message}`; }
}

async function doGemini(q){
  const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${keys.gemini}`,{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({contents:[{parts:[{text:getPrompt(q)}]}], generationConfig:{temperature:0.7, maxOutputTokens: 4096}})
  });
  const data=await res.json();
  return data.candidates[0].content.parts[0].text;
}

async function doSerper(q){
  const res=await fetch('https://google.serper.dev/search',{
    method:'POST',headers:{'X-API-KEY':keys.serper,'Content-Type':'application/json'},
    body:JSON.stringify({q})
  });
  const data=await res.json();
  let md='## Search Results\n\n';
  data.organic.forEach(i=> md+=`* [**${i.title}**](${i.link})\n ${i.snippet}\n\n`);
  return md;
}

function clearFeed(){ document.getElementById('feed').innerHTML='<div class="empty" id="empty"><h2>Ready</h2></div>'; }
</script>
</body>
</html>
