<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InterviewAI - SAP CPI Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f4f8; --surface:#ffffff; --border:#e2e8f0; --text:#1e293b;
  --accent:#4f46e5; --r-lg:16px; --shadow-lg:0 10px 40px rgba(0,0,0,.12);
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased}

/* ═══════════════ SETUP SCREEN ═══════════════ */
#setup{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);z-index:100;}
.card{background:#fff;border-radius:20px;padding:40px;width:480px;box-shadow:0 20px 60px rgba(0,0,0,.25);}
.ai-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.ai-opt{border:2px solid #e2e8f0;border-radius:10px;padding:15px;cursor:pointer;text-align:center;font-weight:600;}
.ai-opt.selected{border-color:var(--accent);background:#ede9fe;color:var(--accent);}
input{width:100%;border:1.5px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:20px;outline:none;font-family:monospace;}
.go-btn{width:100%;background:var(--accent);border:none;border-radius:10px;color:#fff;padding:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 10px rgba(79,70,229,0.3);}

/* ═══════════════ MAIN APP ═══════════════ */
#app{display:none;height:100vh;flex-direction:column;}
.bar{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:56px;background:#fff;border-bottom:1px solid var(--border);flex-shrink:0;font-weight:700;}
.feed{flex:1;overflow-y:auto;padding:30px 20px;display:block;scroll-behavior:smooth;}
.feed::-webkit-scrollbar{width:6px}
.feed::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:6px}

/* Response Card */
.qa{background:#fff;border:1.5px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--shadow-lg);width:100%;max-width:950px;margin:0 auto 40px auto;animation:pop .25s ease;flex-shrink:0;}
@keyframes pop{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.qa-q{padding:18px 25px;background:#f8fafc;border-bottom:1.5px solid var(--border);font-weight:700;font-size:16px;color:var(--accent);}
.qa-a{padding:25px 30px}
.qa-a-body{font-size:16px;line-height:1.8;color:#1e293b;}
.qa-a-body h1, .qa-a-body h2 {margin:25px 0 15px;padding-bottom:8px;border-bottom:1px solid #edf2f7;color:#000;}
.qa-a-body p {margin-bottom:16px;}
.qa-a-body ul {margin-bottom:16px;padding-left:20px;}
.qa-a-body li {margin-bottom:8px;}

/* Utils */
.bot{padding:12px 20px;background:#fff;border-top:1px solid var(--border);display:flex;justify-content:space-between;font-size:13px;color:#64748b;}
#rec{position:fixed;inset:0;background:rgba(15,23,42,0.95);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:200;color:#fff;}
#rec.on{display:flex}
.rec-btn{width:80px;height:80px;border-radius:50%;background:#ef4444;display:flex;align-items:center;justify-content:center;font-size:32px;margin-bottom:20px;box-shadow:0 0 30px rgba(239,68,68,0.5);}
.stealth-dot {display:none;position:fixed;top:5px;right:5px;width:6px;height:6px;background:red;border-radius:50%;z-index:9999;}
body.stealth-mode .bar, body.stealth-mode .bot {display:none !important;}
body.stealth-mode.is-recording .stealth-dot {display:block;}
body.stealth-mode .qa {box-shadow:none;border-color:transparent;max-width:100%;}
</style>
</head>
<body>
<div class="stealth-dot"></div>

<div id="setup">
  <div class="card">
    <h2 style="margin-bottom:10px;">InterviewAI Pro</h2>
    <p style="color:#64748b;font-size:14px;margin-bottom:25px;">Detailed technical responses for SAP CPI.</p>
    <div class="ai-row">
      <div id="opt-gemini" class="ai-opt selected" onclick="setAI('gemini')">Gemini</div>
      <div id="opt-serper" class="ai-opt" onclick="setAI('serper')">Search</div>
    </div>
    <div style="font-size:11px;font-weight:700;margin-bottom:8px;text-transform:uppercase;color:#94a3b8;">API Key</div>
    <input type="password" id="key-input" value="AIzaSyD6Guhk0m8Q9qvvMpWaNYP5ACQx16p9DIo" placeholder="Enter API Key">
    <button class="go-btn" onclick="startApp()">Start Assistant →</button>
  </div>
</div>

<div id="app">
  <div class="bar">
    <div>InterviewAI</div>
    <div style="font-size:12px;font-weight:400;color:#64748b;">[Alt+S] Stealth | Right-Click to Talk</div>
  </div>
  <div class="feed" id="feed">
    <div id="empty-state" style="text-align:center;margin-top:15vh;color:#94a3b8;">
        <div style="font-size:50px;margin-bottom:10px;">🎤</div>
        <h2>Waiting for Input</h2>
        <p>Right-click once to start recording, speak, then right-click again to send.</p>
    </div>
  </div>
  <div class="bot">
    <div id="status">Status: Ready</div>
    <button onclick="document.querySelectorAll('.qa').forEach(e=>e.remove());document.getElementById('empty-state').style.display='block';">🗑 Clear History</button>
  </div>
</div>

<div id="rec">
  <div class="rec-btn">🎤</div>
  <h2 id="rec-status">Listening...</h2>
  <div id="live-text" style="margin-top:20px;color:#cbd5e1;max-width:80%;text-align:center;font-family:monospace;">...</div>
</div>

<script>
let currentAI = 'gemini';
let recognition = null;
let isRecording = false;
let config = { gemini: '', serper: '' };

function setAI(val) {
    currentAI = val;
    document.querySelectorAll('.ai-opt').forEach(e => e.classList.remove('selected'));
    document.getElementById('opt-' + val).classList.add('selected');
}

function startApp() {
    config.gemini = document.getElementById('key-input').value.trim();
    config.serper = config.gemini; // Assumes same key or you can add second input
    document.getElementById('setup').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
    if (e.altKey && e.key.toLowerCase() === 's') {
        document.body.classList.toggle('stealth-mode');
    }
    if (e.key === 'Escape' && isRecording) stopRecording(false);
});

// Mouse Interaction
document.addEventListener('contextmenu', e => {
    if (document.getElementById('app').style.display === 'flex') {
        e.preventDefault();
        if (!isRecording) startRecording();
        else stopRecording(true);
    }
});

function startRecording() {
    const SpeechSDK = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechSDK) return alert("Speech recognition not supported in this browser.");

    recognition = new SpeechSDK();
    recognition.continuous = true;
    recognition.interimResults = true;
    
    document.getElementById('rec').classList.add('on');
    document.body.classList.add('is-recording');
    isRecording = true;

    recognition.onresult = e => {
        let text = '';
        for (let i = 0; i < e.results.length; i++) text += e.results[i][0].transcript;
        document.getElementById('live-text').textContent = text;
    };
    recognition.start();
}

function stopRecording(shouldSubmit) {
    let finalQuery = document.getElementById('live-text').textContent.trim();
    if (recognition) recognition.abort();
    
    document.getElementById('rec').classList.remove('on');
    document.body.classList.remove('is-recording');
    isRecording = false;

    if (shouldSubmit && finalQuery && finalQuery !== '...') {
        // Auto-Corrections
        finalQuery = finalQuery.replace(/\bSAP CPA\b/gi, 'SAP CPI')
                               .replace(/\bHenry\b/gi, 'Enrich')
                               .replace(/\bcontent in rich\b/gi, 'content enrich');
        handleQuery(finalQuery);
    }
}

async function handleQuery(q) {
    document.getElementById('empty-state').style.display = 'none';
    document.querySelectorAll('.qa').forEach(e => e.remove()); // Keep latest only
    
    const card = document.createElement('div');
    card.className = 'qa';
    card.innerHTML = `<div class="qa-q">${q}</div><div class="qa-a"><div class="ans-body" id="current-ans">Fetching detailed response...</div></div>`;
    document.getElementById('feed').appendChild(card);
    
    try {
        let responseText = "";
        if (currentAI === 'gemini') responseText = await callGemini(q);
        else responseText = await callSerper(q);

        const container = document.getElementById('current-ans');
        container.innerHTML = ""; 
        container.className = "qa-a-body";
        
        // Typing Effect
        let index = 0;
        const interval = setInterval(() => {
            if (index >= responseText.length) {
                clearInterval(interval);
                container.innerHTML = marked.parse(responseText);
                return;
            }
            index += 12;
            container.innerHTML = marked.parse(responseText.slice(0, index));
            document.getElementById('feed').scrollTop = document.getElementById('feed').scrollHeight;
        }, 10);

    } catch (err) {
        document.getElementById('current-ans').innerHTML = `<div style="color:red;padding:10px;border:1px solid red;border-radius:8px;"><b>Error:</b> ${err.message}</div>`;
    }
}

async function callGemini(query) {
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${config.gemini}`;
    const prompt = `Act as an expert technical lead for SAP Cloud Platform Integration (SAP CPI). Provide a high-level, extremely detailed, and professional technical guide for: "${query}". Use bold text for key terms, bullet points for steps, and clear headings. Provide a response equivalent in length and depth to the official Gemini Web UI.`;

    const response = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            contents: [{ parts: [{ text: prompt }] }],
            generationConfig: { maxOutputTokens: 4000, temperature: 0.7 }
        })
    });

    const data = await response.json();
    
    // Diagnostic Check to prevent "undefined" error
    if (data.error) throw new Error(data.error.message);
    if (!data.candidates || data.candidates.length === 0 || !data.candidates[0].content) {
        console.error("Full API Response:", data);
        throw new Error("Empty response from AI. Please check your API key and quota.");
    }

    return data.candidates[0].content.parts[0].text;
}

async function callSerper(query) {
    const response = await fetch('https://google.serper.dev/search', {
        method: 'POST',
        headers: { 'X-API-KEY': config.serper, 'Content-Type': 'application/json' },
        body: JSON.stringify({ q: query })
    });
    const data = await response.json();
    if (!data.organic) throw new Error("No search results found.");
    
    let markdown = "## Search Results\n\n";
    data.organic.slice(0, 5).forEach(res => {
        markdown += `### [${res.title}](${res.link})\n${res.snippet}\n\n`;
    });
    return markdown;
}
</script>
</body>
</html>
