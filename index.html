<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InterviewAI - SAP CPI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f4f8; --surface:#ffffff; --border:#e2e8f0; --text:#1e293b;
  --font:'Inter',sans-serif; --mono:'JetBrains Mono',monospace; --r-lg:16px;
  --shadow-lg:0 10px 40px rgba(0,0,0,.12);
}
body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased}

/* ═══════════════ SETUP SCREEN ═══════════════ */
#setup{
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); z-index:100;
}
.card{background:#fff;border-radius:20px;padding:40px;width:480px;box-shadow:0 20px 60px rgba(0,0,0,.25);}
.brand{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.brand h1{font-size:24px;font-weight:700;}
.ai-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.ai-opt{border:2px solid #e2e8f0;border-radius:10px;padding:15px;cursor:pointer;text-align:center;}
.ai-opt.selected{border-color:#4285f4;background:#dbeafe}
input{width:100%;border:1.5px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:20px;outline:none;}
.go-btn{width:100%;background:#4f46e5;border:none;border-radius:10px;color:#fff;padding:15px;font-weight:600;cursor:pointer;}

/* ═══════════════ MAIN APP ═══════════════ */
#app{display:none;height:100vh;flex-direction:column;background:var(--bg)}
.bar{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:56px;background:#fff;border-bottom:1px solid var(--border);flex-shrink:0;}
.feed{flex:1;overflow-y:auto;padding:30px 20px;display:block;scroll-behavior:smooth;}
.feed::-webkit-scrollbar{width:6px}
.feed::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:6px}

.qa{background:#fff;border:1.5px solid #e2e8f0;border-radius:var(--r-lg);box-shadow:var(--shadow-lg);width:100%;max-width:900px;margin:0 auto 40px auto;animation:pop .25s ease;}
@keyframes pop{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.qa-q{padding:16px 20px;background:#f8fafc;border-bottom:1.5px solid #e2e8f0;font-weight:600;}
.qa-a{padding:24px 28px}
.qa-a-body{font-size:15.5px;line-height:1.8;color:#1e293b;}
.qa-a-body p{margin-bottom:16px;}
.qa-a-body h1, .qa-a-body h2{border-bottom:1px solid #eee;padding-bottom:8px;margin:20px 0 10px;}

.loader{display:flex;align-items:center;gap:8px;color:#94a3b8;}
.bot{padding:10px 20px;background:#fff;border-top:1.5px solid #e2e8f0;display:flex;justify-content:space-between;flex-shrink:0;}

/* Stealth Dot */
.stealth-dot { display: none; position: fixed; top: 5px; right: 5px; width: 5px; height: 5px; background: red; border-radius: 50%; z-index: 9999; }
body.stealth-mode .bar, body.stealth-mode .bot { display: none !important; }
body.stealth-mode.is-recording .stealth-dot { display: block; }

/* Big Recording Overlay */
#rec{position:fixed;inset:0;background:rgba(15,23,42,.92);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:200;color:#fff;}
#rec.on{display:flex}
</style>
</head>
<body>
<div class="stealth-dot"></div>
<div id="setup">
  <div class="card">
    <div class="brand"><h1>InterviewAI</h1></div>
    <div class="ai-row">
      <div id="opt-gemini" class="ai-opt selected" onclick="pickAI('gemini')">Gemini</div>
      <div id="opt-serper" class="ai-opt" onclick="pickAI('serper')">Search</div>
    </div>
    <input type="password" id="kval" value="AIzaSyD6Guhk0m8Q9qvvMpWaNYP5ACQx16p9DIo">
    <button class="go-btn" onclick="launch()">Start Assistant →</button>
  </div>
</div>

<div id="app">
  <div class="bar"><div>InterviewAI</div><div>Right-click to talk | Alt+S Stealth</div></div>
  <div class="feed" id="feed">
    <div id="empty" style="text-align:center;margin-top:100px;"><h2>Ready to Assist</h2><p>Right-click once to start, right-click again to send.</p></div>
  </div>
  <div class="bot"><span>Ready</span><button onclick="document.querySelectorAll('.qa').forEach(e=>e.remove())">🗑 Clear</button></div>
</div>

<div id="rec"><h2>Listening...</h2><div id="rtxt" style="margin-top:20px;font-family:monospace;">...</div></div>

<script>
const keys={gemini:'AIzaSyD6Guhk0m8Q9qvvMpWaNYP5ACQx16p9DIo', serper:''};
let ai='gemini', recog=null, isRec=false, activeCtrl=null;

function pickAI(v){ 
    ai=v; 
    document.querySelectorAll('.ai-opt').forEach(e=>e.classList.remove('selected'));
    document.getElementById('opt-'+v).classList.add('selected');
}
function launch(){ document.getElementById('setup').style.display='none'; document.getElementById('app').style.display='flex'; }

document.addEventListener('contextmenu', e => { 
    if (document.getElementById('app').style.display === 'flex') { 
        e.preventDefault(); if (!isRec) startRec(); else forceSubmit(); 
    }
});

document.addEventListener('keydown', e => { if(e.altKey && e.key.toLowerCase()==='s') document.body.classList.toggle('stealth-mode'); });

function startRec(){
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR) return; activeCtrl = new AbortController();
    recog=new SR(); recog.continuous=true; recog.interimResults=true;
    document.getElementById('rec').classList.add('on'); document.body.classList.add('is-recording');
    isRec=true; let final='';
    recog.onresult=e=>{
        let inter=''; for(let i=e.resultIndex;i<e.results.length;i++) if(e.results[i].isFinal) final+=e.results[i][0].transcript+' '; else inter+=e.results[i][0].transcript;
        document.getElementById('rtxt').textContent=(final+inter).trim()||'Listening...';
    };
    recog.start();
}

function forceSubmit(){
    let q=document.getElementById('rtxt').textContent.trim();
    if(recog) recog.abort(); document.getElementById('rec').classList.remove('on'); document.body.classList.remove('is-recording'); isRec=false;
    q = q.replace(/\bSAP CPA\b/gi,'SAP CPI').replace(/\bHenry\b/gi,'Enrich');
    if(q && q!=='Listening...') answerQ(q);
}

async function answerQ(question){
    document.getElementById('empty').style.display='none';
    document.querySelectorAll('.qa').forEach(e=>e.remove());
    const card=document.createElement('div'); card.className='qa';
    card.innerHTML=`<div class="qa-q">${question}</div><div class="qa-a"><div id="answ" class="loader">Fetching response...</div></div>`;
    document.getElementById('feed').appendChild(card);
    
    try {
        let text='';
        if(ai==='serper') text=await doSerper(question);
        else text=await doGemini(question);
        
        const body=document.getElementById('answ');
        body.className='qa-a-body';
        // Corrected typing effect with marked.js
        let i=0; const chunk=10;
        const iv=setInterval(()=>{
            if(i>=text.length){ clearInterval(iv); body.innerHTML=marked.parse(text); return; }
            i+=chunk; body.innerHTML=marked.parse(text.slice(0,i));
        },15);
    } catch(e) { document.getElementById('answ').textContent="Error: "+e.message; }
}

async function doGemini(q){
    const prompt = `Act as an expert technical consultant for SAP Cloud Platform Integration (SAP CPI). Provide a high-level, comprehensive, and detailed technical explanation for: "${q}". Use bullet points, bold text, and natural formatting. Do not be brief.`;
    const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${keys.gemini}`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({contents:[{parts:[{text:prompt}]}], generationConfig:{maxOutputTokens:4000, temperature:0.7}})
    });
    const data=await res.json();
    if(!data.candidates || !data.candidates[0]) throw new Error("No response from AI. Check your API Key.");
    return data.candidates[0].content.parts[0].text;
}

async function doSerper(q){
    const res=await fetch('https://google.serper.dev/search',{
        method:'POST',headers:{'X-API-KEY':keys.serper,'Content-Type':'application/json'},
        body:JSON.stringify({q})
    });
    const data=await res.json();
    let md='## Search Results\n\n';
    data.organic.forEach(i=> md+=`* [**${i.title}**](${i.link})\n ${i.snippet}\n\n`);
    return md;
}
</script>
</body>
</html>
